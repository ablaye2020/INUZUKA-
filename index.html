<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INUZUKA · Signal Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        .bg-image {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.40;
            pointer-events: none;
            filter: brightness(0.6) saturate(1.2);
        }

        .top-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(90deg, transparent 0%, #ff0000 15%, #ff4444 30%, #ff0000 50%, transparent 70%, #ff0000 85%, transparent 100%);
            background-size: 200% 100%;
            animation: breakLine 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,0,0,0.5);
        }

        @keyframes breakLine {
            0%, 100% { background-position: 0% 0%; opacity: 0.3; }
            50% { background-position: 100% 0%; opacity: 1; }
        }

        .bottom-line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(90deg, transparent 0%, #ff0000 20%, #ff4444 40%, #ff0000 60%, transparent 100%);
            background-size: 200% 100%;
            animation: breakLine 2.5s ease-in-out infinite reverse;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        .line-h, .line-v {
            position: fixed;
            background: rgba(255, 40, 40, 0.05);
            z-index: 1;
            pointer-events: none;
        }
        .line-h {
            height: 1px;
            width: 100%;
            left: -100%;
            animation: slideH 4s linear infinite;
        }
        .line-v {
            width: 1px;
            height: 100%;
            top: -100%;
            animation: slideV 4s linear infinite;
        }

        @keyframes slideH {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        @keyframes slideV {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .line-h:nth-child(4) { top: 15%; animation-duration: 3.0s; }
        .line-h:nth-child(5) { top: 30%; animation-duration: 3.8s; animation-delay: 0.5s; }
        .line-h:nth-child(6) { top: 45%; animation-duration: 2.8s; animation-delay: 1.0s; }
        .line-h:nth-child(7) { top: 60%; animation-duration: 4.0s; animation-delay: 0.2s; }
        .line-h:nth-child(8) { top: 75%; animation-duration: 2.6s; animation-delay: 0.8s; }
        .line-h:nth-child(9) { top: 90%; animation-duration: 3.4s; animation-delay: 0.4s; }

        .line-v:nth-child(10) { left: 15%; animation-duration: 3.2s; }
        .line-v:nth-child(11) { left: 30%; animation-duration: 3.8s; animation-delay: 0.6s; }
        .line-v:nth-child(12) { left: 45%; animation-duration: 2.8s; animation-delay: 0.3s; }
        .line-v:nth-child(13) { left: 60%; animation-duration: 4.2s; animation-delay: 0.9s; }
        .line-v:nth-child(14) { left: 75%; animation-duration: 2.6s; animation-delay: 0.2s; }
        .line-v:nth-child(15) { left: 90%; animation-duration: 3.6s; animation-delay: 0.7s; }

        #access-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #access-overlay.hidden { display: none; }

        #access-overlay .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        #access-overlay .logo span { color: #ff0000; }

        #access-overlay .sub {
            color: #ff2222;
            font-size: 13px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255,0,0,0.3);
        }

        #access-overlay .lock-icon {
            font-size: 40px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        #access-overlay input {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 0, 0, 0.4);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 20px;
            color: #fff;
            text-align: center;
            width: 220px;
            outline: none;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }
        #access-overlay input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.15);
        }
        #access-overlay .btn-access {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 12px 48px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.25);
        }
        #access-overlay .btn-access:hover {
            transform: scale(1.04);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.4);
        }
        #access-overlay .error-msg {
            color: #ff4444;
            font-size: 13px;
            min-height: 20px;
            font-family: 'Courier New', monospace;
        }

        #main-content {
            display: none;
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 38px;
            max-width: 720px;
            width: 100%;
            margin: 20px auto;
        }
        #main-content.visible { display: block; }

        .header-image {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .main-logo {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 14px;
            color: #ffffff;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }
        .main-logo span { color: #ff1a1a; }

        .main-sub {
            text-align: center;
            color: #ff3333;
            font-size: 12px;
            letter-spacing: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 0, 0, 0.06);
            padding-bottom: 16px;
            margin-bottom: 22px;
            font-family: 'Courier New', monospace;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 16px;
            color: #eee;
            font-size: 15px;
            font-family: 'Segoe UI', sans-serif;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-bottom: 1px solid #ff3333;
        }
        .form-group select option {
            background: #111;
            color: #eee;
        }
        .form-group textarea {
            min-height: 60px;
            resize: vertical;
            font-family: 'Segoe UI', sans-serif;
        }

        .generated-box {
            background: rgba(255, 0, 0, 0.03);
            border-radius: 16px;
            padding: 18px 20px;
            margin: 18px 0 20px;
            text-align: left;
            display: none;
            max-height: 450px;
            overflow-y: auto;
            min-height: 50px;
            border-left: 2px solid rgba(255, 0, 0, 0.12);
        }
        .generated-box.visible { display: block; }
        .generated-box .msg-title {
            color: #ff4444;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }
        .generated-box .msg-content {
            color: #eee;
            font-size: 15px;
            line-height: 1.9;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Segoe UI', sans-serif;
        }
        .generated-box .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 17px;
            background: #ff3333;
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 14px 34px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 130px;
            font-family: 'Courier New', monospace;
        }
        .btn-generate {
            background: #ff1a1a;
            color: #fff;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }
        .btn-generate:hover {
            background: #cc0000;
            transform: scale(1.03);
            box-shadow: 0 0 60px rgba(255,  0, 0, 0.35);
        }
        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .btn-copy:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
        }
        .btn-whatsapp:hover {
            background: #1da851;
            transform: scale(1.03);
        }
        .btn-whatsapp:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 0, 0, 0.15);
            padding: 12px 28px;
            border-radius: 40px;
            color: #ccc;
            font-size: 13px;
            z-index: 1002;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
        .toast.show { opacity: 1; }

        .status-text {
            color: #777;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            min-height: 18px;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 0, 0, 0.05);
            font-family: 'Courier New', monospace;
        }
        .footer-link a {
            color: #ff5555;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 3px;
            transition: 0.3s;
            opacity: 0.6;
        }
        .footer-link a:hover {
            opacity: 1;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .whatsapp-note {
            text-align: center;
            color: #444;
            font-size: 10px;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            #main-content { padding: 24px 16px; margin: 10px; }
            .main-logo { font-size: 30px; letter-spacing: 8px; }
            #access-overlay .logo { font-size: 32px; letter-spacing: 8px; }
            #access-overlay input { width: 180px; font-size: 16px; }
            .header-image { max-height: 180px; }
        }
    </style>
</head>
<body>

    <img class="bg-image" src="53517900-6B79-4E2E-92C0-16CD724C4CAE.jpeg" alt="background" onerror="this.style.display='none'">

    <div class="top-line"></div>
    <div class="bottom-line"></div>

    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>

    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>

    <div id="access-overlay">
        <div class="lock-icon">⛔</div>
        <div class="logo">INUZUKA</div>
        <div class="sub">Access Restricted</div>
        <input type="password" id="access-input" placeholder="••••" maxlength="4" autofocus>
        <button class="btn-access" onclick="checkAccess()">ENTER</button>
        <div class="error-msg" id="access-error"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div id="main-content">
        <img class="header-image" id="header-image" src="53517900-6B79-4E2E-92C0-16CD724C4CAE.jpeg" alt="INUZUKA" onerror="this.style.display='none'">

        <div class="main-logo">I<span>N</span>UZUKA</div>
        <div class="main-sub">⚡ Signal Generator ⚡</div>

        <div class="form-group">
            <label>👤 Name / Username of the abuser</label>
            <input type="text" id="nom" placeholder="Ex: John DOE or @username">
        </div>

        <div class="form-group">
            <label>📱 Their WhatsApp number</label>
            <input type="text" id="numero" placeholder="+221 70 820 15 85">
        </div>

        <div class="form-group">
            <label>⚠️ Type of violation</label>
            <select id="type">
                <option value="harassment">Harassment / Bullying</option>
                <option value="scam">Scam / Fraud</option>
                <option value="identity">Identity Theft</option>
                <option value="illegal">Illegal Content</option>
                <option value="threats">Threats / Violence</option>
                <option value="impersonation">Impersonation</option>
                <option value="doxxing">Doxxing / Private info leaked</option>
                <option value="other">Other (serious)</option>
            </select>
        </div>

        <div class="form-group">
            <label>📝 What happened ? (be honest)</label>
            <textarea id="details" placeholder="Describe exactly what this person did to you..."></textarea>
        </div>

        <div class="generated-box" id="generated-box">
            <div class="msg-title">📨 GENERATING MESSAGE...</div>
            <div class="msg-content" id="message-output">
                <span class="cursor-blink"></span>
            </div>
        </div>

        <div class="status-text" id="status-text">Fill the form and click GENERATE</div>

        <div class="btn-group">
            <button class="btn btn-generate" id="btn-generate" onclick="startGeneration()">⚡ GENERATE</button>
            <button class="btn btn-copy" id="btn-copy" disabled onclick="copyMessage()">📋 COPY</button>
            <button class="btn btn-whatsapp" id="btn-wa" disabled onclick="sendWhatsApp()">💬 WHATSAPP</button>
        </div>

        <div class="whatsapp-note">📌 Message copied automatically — then paste in WhatsApp Support chat</div>

        <div class="footer-link">
            <a href="https://ablaye2020.github.io" target="_blank">ablaye2020.github.io</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bgImg = document.querySelector('.bg-image');
            const headerImg = document.getElementById('header-image');
            bgImg.onerror = function() { this.style.display = 'none'; };
            headerImg.onerror = function() { this.style.display = 'none'; };
        });

        // ============================================
        // CODES : 1212 = normal, 2112 = ADMIN
        // ============================================
        const ACCESS_CODE = '1212';
        const ADMIN_CODE = '2112';
        let isAdminMode = false;

        function checkAccess() {
            const input = document.getElementById('access-input');
            const error = document.getElementById('access-error');
            
            if (input.value === ACCESS_CODE) {
                document.getElementById('access-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                error.textContent = '';
                isAdminMode = false;
                document.getElementById('status-text').textContent = 'Fill the form and click GENERATE';
                document.getElementById('status-text').style.color = '#777';
            } else if (input.value === ADMIN_CODE) {
                document.getElementById('access-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                error.textContent = '';
                isAdminMode = true;
                document.getElementById('status-text').textContent = '🔴 ADMIN MODE';
                document.getElementById('status-text').style.color = '#ff3333';
            } else {
                error.textContent = '❌ Incorrect code';
                input.value = '';
                input.focus();
            }
        }

        document.getElementById('access-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkAccess();
        });

        // ============================================
        // 5 STYLES DE MESSAGES LONGS ET CONVAINCANTS
        // ============================================
        let messageIndex = 0;

        function generateFullMessage() {
            const nom = document.getElementById('nom').value.trim();
            const numero = document.getElementById('numero').value.trim();
            const details = document.getElementById('details').value.trim();
            const type = document.getElementById('type').value;

            const typeLabels = {
                harassment: "harassment and bullying",
                scam: "scam and fraud",
                identity: "identity theft",
                illegal: "illegal content sharing",
                threats: "threats and violence",
                impersonation: "impersonation",
                doxxing: "doxxing and privacy violation",
                other: "serious violation"
            };

            const typeLabel = typeLabels[type] || "serious violation";

            // === ADMIN MODE (ultra convaincant) ===
            if (isAdminMode) {
                const adminStyles = [
                    `I'm writing to file a formal complaint against ${nom || 'a WhatsApp user'} ${numero ? 'with the number ' + numero + ' ' : ''}who has been engaging in ${typeLabel}. This has been going on for weeks now and I'm genuinely scared for my safety. ${details || 'They have been sending threatening messages, making me feel unsafe in my own home.'} I've tried blocking them but they keep creating new accounts. I have screenshots of everything. I need WhatsApp to take this seriously and permanently ban this person. This is not just a minor issue — this is a matter of personal safety. Please investigate and remove this user immediately. I'm available to provide any additional evidence you need.`,

                    `This is a formal complaint against ${nom || 'an individual'} ${numero ? '(' + numero + ') ' : ''}who is using WhatsApp to commit ${typeLabel}. I'm honestly scared and don't know what to do anymore. ${details || 'They have been harassing me daily, sending threats, and even sharing my personal information without my consent.'} I've reported them multiple times but nothing has changed. This person is dangerous and needs to be removed from the platform. I'm prepared to involve law enforcement if necessary. Please take immediate action and confirm when this account has been banned.`,

                    `I need to report ${nom || 'a user'} ${numero ? 'with number ' + numero + ' ' : ''}for ${typeLabel}. This person has been causing me serious distress and I fear for my well-being. ${details || 'The harassment has escalated to threats and I no longer feel safe using WhatsApp.'} I've documented everything and I'm ready to share the evidence. I'm asking WhatsApp to investigate this matter urgently and permanently ban this user. This behavior violates your terms of service and puts users at risk. Please respond with confirmation of action taken.`
                ];
                const msg = adminStyles[messageIndex % adminStyles.length];
                messageIndex++;
                return msg;
            }

            // === NORMAL MODE (5 styles longs et variés) ===
            let msg = '';
            const style = messageIndex % 5;

            switch(style) {
                case 0: // Paniqué / Pressé
                    msg = `Hi, I'm really panicking right now and I need your help urgently. ${nom ? 'There\'s a person named ' + nom + ' ' : 'There\'s someone '} ${numero ? 'with the number ' + numero + ' ' : ''}who has been ${typeLabel} me constantly. ${details || 'They send me threatening messages every day, and I feel like I can\'t escape it.'} I've tried blocking them but they just create new accounts. I'm actually scared to open WhatsApp now because I don't know what I'll find. This person is really persistent and I don't feel safe anymore. Can you please investigate this and block them permanently? I have screenshots of everything they've sent me and I'm happy to share them. Please help me, I don't know what else to do.`;
                    break;

                case 1: // Triste / Désespéré
                    msg = `I'm writing this because I feel completely helpless and desperate. ${nom ? 'A user named ' + nom + ' ' : 'Someone '} ${numero ? 'from the number ' + numero + ' ' : ''}has been making my life a nightmare with ${typeLabel}. ${details || 'Every day I wake up to new threats and insults. It\'s exhausting and I can\'t take it anymore.'} I've lost sleep, I've lost my peace of mind, and I just want this to stop. I've reported this person before but nothing was done. I'm begging you to take this seriously. I don't feel safe on your platform anymore. Please investigate and remove this user. I need your help because I don't know where else to turn.`;
                    break;

                case 2: // En colère / Frustré
                    msg = `I'm so fed up with this situation. ${nom ? nom + ' ' : 'This person '} ${numero ? '(' + numero + ') ' : ''}has been crossing every line with ${typeLabel}. ${details || 'I\'ve been patient, I\'ve tried to ignore it, but nothing works. They keep coming back.'} I've reported them multiple times and WhatsApp has done nothing. Why is this allowed to continue? This person is clearly violating your terms of service and making the platform unsafe for users like me. I'm angry and frustrated that I have to deal with this. I want this person banned immediately. I'm not going to stop until something is done about this. Please take action now.`;
                    break;

                case 3: // Fatigué / Épuisé
                    msg = `I can't take this anymore. I'm completely exhausted. ${nom ? nom + ' ' : 'This person '} ${numero ? 'from ' + numero + ' ' : ''}has been draining me mentally and emotionally with ${typeLabel}. ${details || 'It\'s the same thing every day — threats, insults, harassment. I can\'t even relax anymore.'} I feel like I'm being targeted and I don't know why. I've tried everything — blocking, reporting, ignoring — but nothing works. I just want peace. I want to use WhatsApp without being harassed. Please help me. I'm tired of fighting this alone. I need your support to end this once and for all.`;
                    break;

                case 4: // Direct / Franc
                    msg = `Let me be direct with you — ${nom || 'this person'} ${numero ? '(' + numero + ') ' : ''}is a serious problem. They've been ${typeLabel} me and it needs to stop immediately. ${details || 'I\'ve documented everything and I\'m ready to take legal action if necessary.'} This is not a minor complaint. This person is dangerous and WhatsApp needs to take responsibility. I'm asking you to investigate this matter thoroughly and permanently ban this user. I've been a loyal WhatsApp user for years and I expect to feel safe on your platform. Please respond with confirmation of what action you're taking. I'm not going to let this go.`;
                    break;
            }

            messageIndex++;
            return msg;
        }

        // ============================================
        // GÉNÉRATION
        // ============================================
        let isGenerating = false;
        let displayText = '';

        function startGeneration() {
            if (isGenerating) return;

            const output = document.getElementById('message-output');
            const box = document.getElementById('generated-box');
            const btnGen = document.getElementById('btn-generate');
            const btnCopy = document.getElementById('btn-copy');
            const btnWa = document.getElementById('btn-wa');
            const status = document.getElementById('status-text');

            isGenerating = true;
            btnGen.disabled = true;
            btnCopy.disabled = true;
            btnWa.disabled = true;
            status.textContent = '⏳ Generating...';
            output.textContent = '';
            box.classList.add('visible');

            const fullMessage = generateFullMessage();
            const chars = fullMessage.split('');
            let index = 0;
            displayText = '';

            function typeNextChar() {
                if (index < chars.length) {
                    displayText += chars[index];
                    output.textContent = displayText;
                    index++;
                    const delay = chars[index - 1] === '\n' ? 40 : 12 + Math.random() * 20;
                    setTimeout(typeNextChar, delay);
                } else {
                    isGenerating = false;
                    btnGen.disabled = false;
                    btnCopy.disabled = false;
                    btnWa.disabled = false;
                    if (isAdminMode) {
                        status.textContent = '✅ ADMIN — ULTRA CONVINCING';
                        status.style.color = '#ff3333';
                    } else {
                        status.textContent = '✅ Message ready';
                        status.style.color = '#777';
                    }
                    showToast('✅ Message generated');
                }
            }

            setTimeout(typeNextChar, 150);
        }

        function copyMessage() {
            const text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 Copied');
            }).catch(() => {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied');
            });
        }

        function sendWhatsApp() {
            const text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');

            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 Copied! Opening WhatsApp...');
            }).catch(() => {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied! Opening WhatsApp...');
            });

            setTimeout(() => {
                window.open('https://wa.me/', '_blank');
            }, 500);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2500);
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('generated-box').classList.remove('visible');
            document.getElementById('message-output').textContent = '';
            document.getElementById('status-text').textContent = 'Fill the form and click GENERATE';
        });
    </script>

</body>
</html>
