<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANUBIS · Signal Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* === IMAGE DE FOND (TRÈS VISIBLE) === */
        .bg-image {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.55;
            pointer-events: none;
            filter: brightness(0.7) saturate(1.2);
        }

        /* === LIGNE ROUGE BRI SÉE EN HAUT (EFFET ATTRACTIF) === */
        .top-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #ff0000 10%, 
                #ff3333 20%, 
                #ff0000 30%, 
                transparent 40%,
                #ff0000 50%,
                #ff3333 60%,
                #ff0000 70%,
                transparent 80%,
                #ff0000 90%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: breakLine 1.8s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(255,0,0,0.6), 0 0 80px rgba(255,0,0,0.3);
        }

        @keyframes breakLine {
            0% { background-position: 0% 0%; opacity: 0.4; }
            25% { opacity: 1; }
            50% { background-position: 100% 0%; opacity: 0.6; }
            75% { opacity: 1; }
            100% { background-position: 0% 0%; opacity: 0.4; }
        }

        /* === LIGNE ROUGE BRI SÉE EN BAS === */
        .bottom-line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 100;
            pointer-events: none;
            background: linear-gradient(90deg, 
                transparent 0%, 
                #ff0000 15%, 
                #ff4444 25%, 
                #ff0000 35%, 
                transparent 50%,
                #ff0000 65%,
                #ff4444 75%,
                #ff0000 85%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: breakLine 2.2s ease-in-out infinite reverse;
            box-shadow: 0 0 30px rgba(255,0,0,0.4);
        }

        /* === LIGNES ROUGES ANIMÉES (fond) === */
        .line-h {
            position: fixed;
            height: 1px;
            background: rgba(255, 40, 40, 0.12);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.05);
            z-index: 1;
            pointer-events: none;
            width: 100%;
            left: -100%;
            animation: slideH 4s linear infinite;
        }

        .line-v {
            position: fixed;
            width: 1px;
            background: rgba(255, 40, 40, 0.12);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.05);
            z-index: 1;
            pointer-events: none;
            height: 100%;
            top: -100%;
            animation: slideV 4s linear infinite;
        }

        @keyframes slideH {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes slideV {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .line-h:nth-child(4) { top: 12%; animation-duration: 3.0s; }
        .line-h:nth-child(5) { top: 26%; animation-duration: 3.8s; animation-delay: 0.5s; }
        .line-h:nth-child(6) { top: 40%; animation-duration: 2.8s; animation-delay: 1.0s; }
        .line-h:nth-child(7) { top: 54%; animation-duration: 4.0s; animation-delay: 0.2s; }
        .line-h:nth-child(8) { top: 68%; animation-duration: 2.6s; animation-delay: 0.8s; }
        .line-h:nth-child(9) { top: 82%; animation-duration: 3.4s; animation-delay: 0.4s; }
        .line-h:nth-child(10) { top: 94%; animation-duration: 2.4s; animation-delay: 1.2s; }

        .line-v:nth-child(11) { left: 12%; animation-duration: 3.2s; }
        .line-v:nth-child(12) { left: 26%; animation-duration: 3.8s; animation-delay: 0.6s; }
        .line-v:nth-child(13) { left: 40%; animation-duration: 2.8s; animation-delay: 0.3s; }
        .line-v:nth-child(14) { left: 54%; animation-duration: 4.2s; animation-delay: 0.9s; }
        .line-v:nth-child(15) { left: 68%; animation-duration: 2.6s; animation-delay: 0.2s; }
        .line-v:nth-child(16) { left: 82%; animation-duration: 3.6s; animation-delay: 0.7s; }
        .line-v:nth-child(17) { left: 94%; animation-duration: 2.4s; animation-delay: 1.1s; }

        /* === PARTICULES ROUGES (effet magique) === */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,0,0,0.6);
            z-index: 2;
            pointer-events: none;
            animation: floatParticle 6s linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* === ACCESS OVERLAY === */
        #access-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.90);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #access-overlay.hidden { display: none; }

        #access-overlay .logo {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 14px;
            color: #fff;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.8), 0 0 120px rgba(255, 0, 0, 0.3);
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        #access-overlay .logo span { color: #ff0000; }

        #access-overlay .sub {
            color: #ff2222;
            font-size: 14px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 40px rgba(255,0,0,0.4);
            margin-bottom: 10px;
        }

        #access-overlay .lock-icon {
            font-size: 50px;
            margin-bottom: 10px;
            opacity: 0.9;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        #access-overlay input {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 0, 0, 0.4);
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 22px;
            color: #fff;
            text-align: center;
            width: 240px;
            outline: none;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
        }
        #access-overlay input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
        }
        #access-overlay .btn-access {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 14px 56px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Courier New', monospace;
            letter-spacing: 6px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }
        #access-overlay .btn-access:hover {
            transform: scale(1.05);
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.6);
        }
        #access-overlay .error-msg {
            color: #ff4444;
            font-size: 14px;
            min-height: 20px;
            font-family: 'Courier New', monospace;
        }

        /* === MAIN CONTENT (SANS ENCADREMENT) === */
        #main-content {
            display: none;
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 44px 42px;
            max-width: 750px;
            width: 100%;
            margin: 20px auto;
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.05);
        }
        #main-content.visible { display: block; }

        /* === IMAGE EN HAUT === */
        .header-image {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 18px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.1);
            transition: 0.5s;
        }
        .header-image:hover {
            transform: scale(1.01);
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.2);
        }

        /* === ANUBIS === */
        .main-logo {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 18px;
            color: #ffffff;
            text-shadow: 0 0 80px rgba(255, 255, 255, 0.1), 0 0 60px rgba(255, 0, 0, 0.3);
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 6px;
        }
        .main-logo span { 
            color: #ff1a1a;
            text-shadow: 0 0 80px rgba(255, 0, 0, 0.7);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 40px rgba(255,0,0,0.4); }
            50% { text-shadow: 0 0 80px rgba(255,0,0,0.8), 0 0 120px rgba(255,0,0,0.3); }
        }

        .main-sub {
            text-align: center;
            color: #ff3333;
            font-size: 14px;
            letter-spacing: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 0, 0, 0.08);
            padding-bottom: 20px;
            margin-bottom: 26px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 40px rgba(255,0,0,0.15);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            color: #dddddd;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 18px;
            color: #f0f0f0;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: 0.3s;
            border-radius: 0;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-bottom: 1px solid #ff3333;
            box-shadow: 0 2px 30px rgba(255, 0, 0, 0.04);
            background: rgba(255, 255, 255, 0.02);
        }
        .form-group select option {
            background: #111;
            color: #eee;
        }
        .form-group textarea {
            min-height: 70px;
            resize: vertical;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .form-group textarea:focus {
            border-bottom: 1px solid #ff3333;
        }

        .generated-box {
            background: rgba(255, 0, 0, 0.03);
            border-radius: 20px;
            padding: 20px 24px;
            margin: 20px 0 24px;
            text-align: left;
            display: none;
            max-height: 440px;
            overflow-y: auto;
            min-height: 60px;
            border-left: 2px solid rgba(255, 0, 0, 0.15);
        }
        .generated-box.visible { display: block; }
        .generated-box .msg-title {
            color: #ff4444;
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
        .generated-box .msg-content {
            color: #eeeeee;
            font-size: 15px;
            line-height: 2.0;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Courier New', monospace;
        }
        .generated-box .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 18px;
            background: #ff3333;
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            letter-spacing: 1.5px;
            flex: 1 1 auto;
            min-width: 140px;
            font-family: 'Courier New', monospace;
        }
        .btn-generate {
            background: #ff1a1a;
            color: #fff;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.25);
        }
        .btn-generate:hover {
            background: #cc0000;
            transform: scale(1.04);
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.5);
        }
        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.06);
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
        }
        .btn-copy:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            box-shadow: 0 0 50px rgba(37, 211, 102, 0.15);
        }
        .btn-whatsapp:hover {
            background: #1da851;
            transform: scale(1.04);
            box-shadow: 0 0 70px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 14px 32px;
            border-radius: 50px;
            color: #ddd;
            font-size: 14px;
            z-index: 1002;
            opacity: 0;
            transition: 0.5s;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.05);
        }
        .toast.show { opacity: 1; }

        .status-text {
            color: #888;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            min-height: 20px;
            letter-spacing: 1px;
        }

        .footer-link {
            text-align: center;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 0, 0, 0.06);
            font-family: 'Courier New', monospace;
        }
        .footer-link a {
            color: #ff5555;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 4px;
            transition: 0.3s;
            opacity: 0.7;
        }
        .footer-link a:hover {
            color: #ff0000;
            opacity: 1;
            text-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }

        .whatsapp-note {
            text-align: center;
            color: #444;
            font-size: 11px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            #main-content { padding: 28px 18px; margin: 10px; }
            .main-logo { font-size: 34px; letter-spacing: 10px; }
            #access-overlay .logo { font-size: 36px; letter-spacing: 8px; }
            #access-overlay input { width: 200px; font-size: 18px; }
            .header-image { max-height: 200px; }
        }
    </style>
</head>
<body>

    <!-- === IMAGE DE FOND === -->
    <img class="bg-image" src="53517900-6B79-4E2E-92C0-16CD724C4CAE.jpeg" alt="background" onerror="this.style.display='none'">

    <!-- === LIGNE ROUGE BRI SÉE EN HAUT === -->
    <div class="top-line"></div>

    <!-- === LIGNE ROUGE BRI SÉE EN BAS === -->
    <div class="bottom-line"></div>

    <!-- === PARTICULES ROUGES === -->
    <div id="particles-container"></div>

    <!-- === LIGNES ROUGES ANIMÉES === -->
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>
    <div class="line-h"></div>

    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>
    <div class="line-v"></div>

    <!-- === ACCESS OVERLAY === -->
    <div id="access-overlay">
        <div class="lock-icon">⛔</div>
        <div class="logo">ANUBIS</div>
        <div class="sub">Access Restricted</div>
        <input type="password" id="access-input" placeholder="••••" maxlength="4" autofocus>
        <button class="btn-access" onclick="checkAccess()">ENTER</button>
        <div class="error-msg" id="access-error"></div>
    </div>

    <!-- === TOAST === -->
    <div class="toast" id="toast"></div>

    <!-- === MAIN CONTENT === -->
    <div id="main-content">
        <!-- IMAGE EN HAUT -->
        <img class="header-image" id="header-image" src="53517900-6B79-4E2E-92C0-16CD724C4CAE.jpeg" alt="ANUBIS" onerror="this.style.display='none'">

        <div class="main-logo">A<span>N</span>U<span>B</span>IS</div>
        <div class="main-sub">⚡ Signal Generator ⚡</div>

        <div class="form-group">
            <label>👤 Name / Username of the abuser</label>
            <input type="text" id="nom" placeholder="Ex: John DOE or @username">
        </div>

        <div class="form-group">
            <label>📱 Their WhatsApp number</label>
            <input type="text" id="numero" placeholder="+221 70 820 15 85">
        </div>

        <div class="form-group">
            <label>⚠️ Type of violation</label>
            <select id="type">
                <option value="harassment">Harassment / Bullying</option>
                <option value="scam">Scam / Fraud</option>
                <option value="identity">Identity Theft</option>
                <option value="illegal">Illegal Content</option>
                <option value="threats">Threats / Violence</option>
                <option value="impersonation">Impersonation</option>
                <option value="doxxing">Doxxing / Private info leaked</option>
                <option value="other">Other (serious)</option>
            </select>
        </div>

        <div class="form-group">
            <label>📝 What happened ? (be honest)</label>
            <textarea id="details" placeholder="Describe exactly what this person did to you..."></textarea>
        </div>

        <div class="generated-box" id="generated-box">
            <div class="msg-title">📨 GENERATING MESSAGE...</div>
            <div class="msg-content" id="message-output">
                <span class="cursor-blink"></span>
            </div>
        </div>

        <div class="status-text" id="status-text">Fill the form and click GENERATE</div>

        <div class="btn-group">
            <button class="btn btn-generate" id="btn-generate" onclick="startGeneration()">⚡ GENERATE</button>
            <button class="btn btn-copy" id="btn-copy" disabled onclick="copyMessage()">📋 COPY</button>
            <button class="btn btn-whatsapp" id="btn-wa" disabled onclick="sendWhatsApp()">💬 WHATSAPP</button>
        </div>

        <div class="whatsapp-note">📌 Message copied automatically — then paste in WhatsApp Support chat</div>

        <div class="footer-link">
            <a href="https://ablaye2020.github.io" target="_blank">ablaye2020.github.io</a>
        </div>
    </div>

    <script>
        // ============================================
        // PARTICULES ROUGES
        // ============================================
        (function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const tx = (Math.random() - 0.5) * 500;
                const ty = (Math.random() - 0.5) * 500;
                const size = 2 + Math.random() * 4;
                p.style.left = x + '%';
                p.style.top = y + '%';
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.setProperty('--tx', tx + 'px');
                p.style.setProperty('--ty', ty + 'px');
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                p.style.animationDelay = (Math.random() * 6) + 's';
                container.appendChild(p);
            }
        })();

        // ============================================
        // IMAGE
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            const bgImg = document.querySelector('.bg-image');
            const headerImg = document.getElementById('header-image');
            bgImg.onerror = function() { this.style.display = 'none'; };
            headerImg.onerror = function() { this.style.display = 'none'; };
        });

        // ============================================
        // CODES : 1212 = normal, 2112 = ADMIN
        // ============================================
        const ACCESS_CODE = '1212';
        const ADMIN_CODE = '2112';
        let isAdminMode = false;

        function checkAccess() {
            const input = document.getElementById('access-input');
            const error = document.getElementById('access-error');
            
            if (input.value === ACCESS_CODE) {
                document.getElementById('access-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                error.textContent = '';
                isAdminMode = false;
                document.getElementById('status-text').textContent = 'Fill the form and click GENERATE';
                document.getElementById('status-text').style.color = '#888';
            } else if (input.value === ADMIN_CODE) {
                document.getElementById('access-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                error.textContent = '';
                isAdminMode = true;
                document.getElementById('status-text').textContent = '🔴 ADMIN MODE — ULTRA CONVINCING MESSAGES';
                document.getElementById('status-text').style.color = '#ff3333';
            } else {
                error.textContent = '❌ Incorrect code';
                input.value = '';
                input.focus();
            }
        }

        document.getElementById('access-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkAccess();
        });

        // ============================================
        // GÉNÉRATION
        // ============================================
        let isGenerating = false;
        let displayText = '';

        function generateFullMessage() {
            const nom = document.getElementById('nom').value.trim();
            const numero = document.getElementById('numero').value.trim();
            const type = document.getElementById('type').value;
            const details = document.getElementById('details').value.trim();

            const typeLabels = {
                harassment: "HARASSMENT & BULLYING",
                scam: "FRAUD / SCAM",
                identity: "IDENTITY THEFT",
                illegal: "ILLEGAL CONTENT",
                threats: "THREATS & VIOLENCE",
                impersonation: "IMPERSONATION",
                doxxing: "DOXXING / PRIVATE INFO LEAKED",
                other: "SERIOUS VIOLATION"
            };

            // === ADMIN MODE ===
            if (isAdminMode) {
                let msg = '';
                msg += `🔴🔴🔴 CRIMINAL COMPLAINT - ${typeLabels[type] || 'SERIOUS VIOLATION'} 🔴🔴🔴\n\n`;
                msg += `This is a FORMAL LEGAL COMPLAINT against a WhatsApp user engaged in CRIMINAL ACTIVITY.\n`;
                msg += `This person is a DANGER to public safety and must be removed IMMEDIATELY.\n\n`;

                if (nom) msg += `🔴 OFFENDER: ${nom}\n`;
                if (numero) msg += `📱 PHONE: ${numero}\n\n`;

                msg += `📌 CRIMINAL BEHAVIOR:\n${details || 'This individual is committing serious crimes using your platform.'}\n\n`;

                msg += `⚠️ THIS IS A MATTER OF PUBLIC SAFETY — NOT A MINOR COMPLAINT.\n\n`;
                msg += `LEGAL DEMANDS:\n`;
                msg += `→ PERMANENT BAN of this account within 24 HOURS\n`;
                msg += `→ COMPLETE INVESTIGATION of all related accounts\n`;
                msg += `→ PRESERVATION OF ALL CHAT LOGS AND METADATA\n`;
                msg += `→ COOPERATION WITH LAW ENFORCEMENT AGENCIES\n\n`;

                msg += `I have documented evidence including screenshots, timestamps, and chat history.\n`;
                msg += `A POLICE REPORT HAS BEEN FILED and is pending your response.\n\n`;

                msg += `LEGAL NOTICE: WhatsApp will be held LIABLE if this user is not removed and continues to cause harm.\n`;
                msg += `I am consulting with my attorney and preparing for legal action.\n\n`;

                msg += `RESPONSE REQUIRED WITHIN 24 HOURS with confirmation of action taken.\n`;
                msg += `I expect to be contacted by a HUMAN SUPERVISOR, not an automated system.\n\n`;

                msg += `🔴 This matter is URGENT and requires IMMEDIATE attention. 🔴`;
                return msg;
            }

            // === NORMAL MODE ===
            let msg = '';
            msg += `🚨 URGENT REPORT - ${typeLabels[type] || 'SERIOUS VIOLATION'}\n\n`;
            msg += `I am filing an OFFICIAL COMPLAINT against a WhatsApp user who is DANGEROUS and is violating your Terms of Service.\n\n`;

            if (nom) msg += `🔴 ABUSER: ${nom}\n`;
            if (numero) msg += `📱 NUMBER: ${numero}\n\n`;

            msg += `📌 WHAT HAPPENED:\n${details || 'This person is engaging in serious criminal behavior on your platform.'}\n\n`;

            msg += `⚠️ THIS IS NOT A MINOR ISSUE — THIS IS A SAFETY EMERGENCY.\n\n`;
            msg += `I DEMAND:\n`;
            msg += `→ IMMEDIATE BAN of this account\n`;
            msg += `→ FULL INVESTIGATION\n`;
            msg += `→ PRESERVATION OF CHAT LOGS (for legal action)\n\n`;

            msg += `I am prepared to take LEGAL ACTION if WhatsApp does not act immediately.\n`;
            msg += `This person is DANGEROUS and needs to be removed from the platform NOW.\n\n`;

            msg += `I have screenshots, chat logs, and evidence ready for law enforcement.\n`;
            msg += `I will file a police report TODAY if this is not resolved.\n\n`;

            msg += `RESPOND TO THIS MESSAGE WITH CONFIRMATION OF ACTION TAKEN.\n`;
            msg += `I need a REAL HUMAN to handle this — not an automated response.\n\n`;

            msg += `My safety depends on your immediate action.`;

            return msg;
        }

        function startGeneration() {
            if (isGenerating) return;

            const output = document.getElementById('message-output');
            const box = document.getElementById('generated-box');
            const btnGen = document.getElementById('btn-generate');
            const btnCopy = document.getElementById('btn-copy');
            const btnWa = document.getElementById('btn-wa');
            const status = document.getElementById('status-text');

            isGenerating = true;
            btnGen.disabled = true;
            btnCopy.disabled = true;
            btnWa.disabled = true;
            status.textContent = '⏳ Generating...';
            output.textContent = '';
            box.classList.add('visible');

            const fullMessage = generateFullMessage();
            const chars = fullMessage.split('');
            let index = 0;
            displayText = '';

            function typeNextChar() {
                if (index < chars.length) {
                    displayText += chars[index];
                    output.textContent = displayText;
                    index++;
                    const delay = chars[index - 1] === '\n' ? 30 : 8 + Math.random() * 15;
                    setTimeout(typeNextChar, delay);
                } else {
                    isGenerating = false;
                    btnGen.disabled = false;
                    btnCopy.disabled = false;
                    btnWa.disabled = false;
                    if (isAdminMode) {
                        status.textContent = '✅ ADMIN MESSAGE READY — ULTRA CONVINCING';
                        status.style.color = '#ff3333';
                    } else {
                        status.textContent = '✅ Message ready — STRONG & URGENT';
                        status.style.color = '#888';
                    }
                    showToast('✅ Message generated');
                }
            }

            setTimeout(typeNextChar, 150);
        }

        function copyMessage() {
            const text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 Copied to clipboard');
            }).catch(() => {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied');
            });
        }

        function sendWhatsApp() {
            const text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');

            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 Message copied! Opening WhatsApp...');
            }).catch(() => {
                const area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Message copied! Opening WhatsApp...');
            });

            setTimeout(() => {
                window.open('https://wa.me/', '_blank');
            }, 500);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('generated-box').classList.remove('visible');
            document.getElementById('message-output').textContent = '';
            document.getElementById('status-text').textContent = 'Fill the form and click GENERATE';
        });
    </script>

</body>
</html>
