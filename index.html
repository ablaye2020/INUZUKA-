<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INUZUKA · Signal Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* ===== VIDÉO EN FOND ===== */
        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
            filter: brightness(0.5) saturate(1.1);
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
        }

        /* ===== PARTICULES D'OR ===== */
        .particle-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            animation: floatParticle 12s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .particle:nth-child(1) { --tx: 300px; --ty: -200px; animation-delay: 0s; left: 10%; top: 20%; }
        .particle:nth-child(2) { --tx: -250px; --ty: 300px; animation-delay: 1.5s; left: 30%; top: 50%; }
        .particle:nth-child(3) { --tx: 350px; --ty: 200px; animation-delay: 3s; left: 60%; top: 30%; }
        .particle:nth-child(4) { --tx: -300px; --ty: -250px; animation-delay: 4.5s; left: 80%; top: 70%; }
        .particle:nth-child(5) { --tx: 200px; --ty: -350px; animation-delay: 6s; left: 20%; top: 80%; }
        .particle:nth-child(6) { --tx: -200px; --ty: 400px; animation-delay: 7.5s; left: 50%; top: 10%; }
        .particle:nth-child(7) { --tx: 400px; --ty: 150px; animation-delay: 9s; left: 70%; top: 60%; }
        .particle:nth-child(8) { --tx: -350px; --ty: -300px; animation-delay: 10.5s; left: 40%; top: 90%; }

        /* ===== ACCESS OVERLAY ===== */
        #access-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #access-overlay.hidden { display: none; }

        #access-overlay .logo {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: 14px;
            color: #fff;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.3), 0 0 120px rgba(255, 215, 0, 0.1);
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        #access-overlay .logo span { color: #ffd700; }

        #access-overlay .sub {
            color: #ffd700;
            font-size: 14px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        #access-overlay .lock-icon {
            font-size: 45px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        #access-overlay input {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 22px;
            color: #fff;
            text-align: center;
            width: 240px;
            outline: none;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
        }
        #access-overlay input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.1);
        }
        #access-overlay .btn-access {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
            padding: 14px 56px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            transition: 0.3s;
        }
        #access-overlay .btn-access:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.3);
        }
        #access-overlay .error-msg {
            color: #ff4444;
            font-size: 14px;
            min-height: 20px;
            font-family: 'Courier New', monospace;
        }

        /* ===== MAIN CONTENT ===== */
        #main-content {
            display: none;
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px 38px;
            max-width: 720px;
            width: 100%;
            margin: 20px auto;
            border: 1px solid rgba(255, 215, 0, 0.06);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
        }

        /* ===== LUFFY GEAR 5 EN HAUT ===== */
        .luffy-container {
            text-align: center;
            margin-bottom: 12px;
            position: relative;
        }

        .luffy-image {
            width: 160px;
            height: 160px;
            object-fit: contain;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.15), 0 0 120px rgba(255, 215, 0, 0.05);
            animation: luffyFloat 4s ease-in-out infinite;
            border: 2px solid rgba(255, 215, 0, 0.08);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05), transparent 70%);
            padding: 8px;
        }

        @keyframes luffyFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.02); }
        }

        /* Anneaux autour de Luffy */
        .luffy-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.08);
            animation: ringExpand 4s ease-out infinite;
            pointer-events: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .luffy-ring:nth-child(2) { width: 180px; height: 180px; animation-delay: 0s; }
        .luffy-ring:nth-child(3) { width: 210px; height: 210px; animation-delay: 1.3s; border-color: rgba(255, 215, 0, 0.05); }
        .luffy-ring:nth-child(4) { width: 240px; height: 240px; animation-delay: 2.6s; border-color: rgba(255, 215, 0, 0.03); }

        @keyframes ringExpand {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
        }

        /* ===== LOGO WHATSAPP ===== */
        .whatsapp-header {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
            z-index: 10;
        }

        .wa-logo-glow {
            display: inline-block;
            position: relative;
            width: 44px;
            height: 44px;
            animation: logoFloat 3s ease-in-out infinite;
        }

        .wa-logo-glow svg {
            width: 100%;
            height: 100%;
            fill: #25D366;
            filter: drop-shadow(0 0 20px rgba(37, 211, 102, 0.2));
            position: relative;
            z-index: 2;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .wa-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid rgba(37, 211, 102, 0.15);
            animation: waRingPulse 2.8s ease-out infinite;
            z-index: 1;
        }
        .wa-ring:nth-child(1) { animation-delay: 0s; inset: -4px; }
        .wa-ring:nth-child(2) { animation-delay: 0.9s; inset: -14px; border-color: rgba(37, 211, 102, 0.08); }

        @keyframes waRingPulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .wa-logo-text {
            display: block;
            color: #25D366;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            margin-top: 2px;
            font-family: 'Courier New', monospace;
            opacity: 0.5;
        }

        /* ===== TEXTE PRINCIPAL ===== */
        .main-logo {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 12px;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 2px;
        }
        .main-logo span { color: #ffd700; }

        .main-sub {
            text-align: center;
            color: #ffd700;
            font-size: 11px;
            letter-spacing: 8px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 215, 0, 0.06);
            padding-bottom: 14px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            opacity: 0.6;
        }

        /* ===== FORMULAIRE ===== */
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            color: #aaa;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 4px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 10px 14px;
            color: #eee;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-bottom: 1px solid #ffd700;
            background: rgba(255, 255, 255, 0.02);
        }
        .form-group select option {
            background: #111;
            color: #eee;
        }
        .form-group textarea {
            min-height: 56px;
            resize: vertical;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== MESSAGE GÉNÉRÉ ===== */
        .generated-box {
            background: rgba(255, 215, 0, 0.02);
            border-radius: 16px;
            padding: 16px 18px;
            margin: 16px 0 18px;
            text-align: left;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            min-height: 50px;
            border-left: 2px solid rgba(255, 215, 0, 0.12);
        }
        .generated-box.visible { display: block; }
        .generated-box .msg-title {
            color: #ffd700;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
            opacity: 0.6;
        }
        .generated-box .msg-content {
            color: #eee;
            font-size: 14px;
            line-height: 1.9;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Segoe UI', sans-serif;
        }
        .generated-box .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 17px;
            background: #ffd700;
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== BOUTONS ===== */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 120px;
            font-family: 'Courier New', monospace;
        }
        .btn-generate {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }
        .btn-generate:hover {
            transform: scale(1.04);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.25);
        }
        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.03);
        }
        .btn-copy:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #1da851);
            color: #fff;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.15);
        }
        .btn-whatsapp:hover {
            transform: scale(1.04);
            box-shadow: 0 0 50px rgba(37, 211, 102, 0.25);
        }
        .btn-whatsapp:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: #ccc;
            font-size: 13px;
            z-index: 1002;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
        .toast.show { opacity: 1; }

        .status-text {
            color: #888;
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            min-height: 18px;
        }

        .footer-link {
            text-align: center;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-family: 'Courier New', monospace;
        }
        .footer-link a {
            color: #ffd700;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 3px;
            transition: 0.3s;
            opacity: 0.4;
        }
        .footer-link a:hover {
            opacity: 0.8;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }

        .whatsapp-note {
            text-align: center;
            color: #555;
            font-size: 10px;
            margin-top: 6px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        /* ===== BOUTON SON ===== */
        .sound-btn {
            position: fixed;
            bottom: 90px;
            right: 30px;
            z-index: 100;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: #ffd700;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .sound-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            #main-content { padding: 24px 16px; margin: 10px; }
            .main-logo { font-size: 28px; letter-spacing: 8px; }
            .luffy-image { width: 120px; height: 120px; }
            .luffy-ring:nth-child(2) { width: 140px; height: 140px; }
            .luffy-ring:nth-child(3) { width: 170px; height: 170px; }
            .luffy-ring:nth-child(4) { width: 200px; height: 200px; }
            .wa-logo-glow { width: 36px; height: 36px; }
            .sound-btn { bottom: 80px; right: 16px; width: 38px; height: 38px; font-size: 16px; }
        }
    </style>
</head>

        <div class="whatsapp-header">

            <button class="btn btn-generate" id="btn-generate" onclick="startGeneration()">⚡ GENERATE</button>
            <button class="btn btn-copy" id="btn-copy" disabled onclick="copyMessage()">📋 COPY</button>
            <button class="btn btn-whatsapp" id="btn-wa" disabled onclick="sendWhatsApp()">💬 WHATSAPP</button>
        </div>

        <div class="whatsapp-note">📌 Message copied automatically — then paste in WhatsApp Support chat</div>

        <div class="footer-link">
            <a href="https://ablaye2020.github.io" target="_blank">ablaye2020.github.io</a>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // GESTION DU SON
        // ============================================
        var video = document.getElementById('bg-video');
        var soundBtn = document.getElementById('soundBtn');
        var isSoundOn = false;

        function toggleSound() {
            if (isSoundOn) {
                video.muted = true;
                soundBtn.textContent = '🔇';
                isSoundOn = false;
            } else {
                video.muted = false;
                video.volume = 0.3;
                soundBtn.textContent = '🔊';
                isSoundOn = true;
            }
        }

        // ============================================
        // CODE D'ACCÈS : 2006
        // ============================================
        function checkAccess() {
            var input = document.getElementById('access-input');
            var error = document.getElementById('access-error');
            var code = input.value;
            
            if (code === '2006') {
                document.getElementById('access-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                error.textContent = '';
            } else {
                error.textContent = '❌ Incorrect code';
                input.value = '';
                input.focus();
            }
        }

        document.getElementById('access-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                checkAccess();
            }
        });

        // ============================================
        // MESSAGES
        // ============================================
        var messageIndex = 0;

        function generateFullMessage() {
            var nom = document.getElementById('nom').value.trim();
            var numero = document.getElementById('numero').value.trim();
            var details = document.getElementById('details').value.trim();
            var type = document.getElementById('type').value;

            var typeLabels = {
                harassment: "harassment and bullying",
                scam: "scam and fraud",
                identity: "identity theft",
                illegal: "illegal content",
                threats: "threats and violence",
                impersonation: "impersonation",
                doxxing: "doxxing and sharing private information",
                other: "serious violations"
            };

            var typeLabel = typeLabels[type] || "serious violations";

            var violationTexts = {
                harassment: "Harassment and intimidation\nAbusive behavior\nMaking me feel unsafe",
                scam: "Scam attempts\nFraudulent behavior\nMisleading others for money",
                identity: "Identity theft\nPretending to be me or others\nUsing fake identity to harm",
                illegal: "Sharing illegal content\nInappropriate material\nViolating community standards",
                threats: "Threats and intimidation\nViolent language\nMaking me fear for my safety",
                impersonation: "Impersonation\nPretending to be someone they're not\nDeceiving others",
                doxxing: "Sharing private information\nDoxxing\nViolating my privacy",
                other: "Multiple Terms of Service violations\nAbusive behavior\nCreating an unsafe environment"
            };

            var violationText = violationTexts[type] || violationTexts.other;

            var messages = [
                "Hello,\n\nI am writing to report a WhatsApp account that is not respecting the platform's rules.\n\n" +
                "Account concerned: " + (numero || "[number not provided]") + (nom ? " (" + nom + ")" : "") + "\n\n" +
                "This account has a dangerous behavior and abuses other users. I have observed several violations:\n" +
                violationText + "\n\n" +
                (details ? "Additional details: " + details + "\n\n" : "") +
                "I have evidence (screenshots) that I can provide if needed.\n\n" +
                "I kindly ask you to permanently block this account to protect the WhatsApp community.\n\n" +
                "Thank you for considering my request.\n\n" +
                "Sincerely,\nA concerned user",

                "Dear WhatsApp Support,\n\n" +
                "I want to report a user who is clearly violating your Terms of Service.\n\n" +
                "User: " + (nom || "Unknown") + "\n" +
                "Phone number: " + (numero || "Not provided") + "\n\n" +
                "This person has been engaging in " + typeLabel + ". I've noticed:\n" +
                violationText + "\n\n" +
                (details ? "Here's what happened: " + details + "\n\n" : "") +
                "I have screenshots and proof of everything I'm saying.\n\n" +
                "I'm asking you to investigate this account and take the necessary action to remove this person from WhatsApp.\n\n" +
                "Thank you for your help.\n\n" +
                "Best regards,\nA WhatsApp user",

                "Hello,\n\n" +
                "I'm reaching out to report a serious issue with a WhatsApp account.\n\n" +
                "Account to report: " + (numero || "Unknown number") + (nom ? " (" + nom + ")" : "") + "\n\n" +
                "This account is engaging in abusive behavior and breaking your rules:\n" +
                violationText + "\n\n" +
                (details || "This person has been causing problems for me and others on the platform.") + "\n\n" +
                "I have documented evidence ready to share if you need it.\n\n" +
                "Please block this account permanently. We need to keep WhatsApp safe for everyone.\n\n" +
                "Thanks for your attention to this matter.\n\n" +
                "Sincerely,\nA concerned user",

                "Dear WhatsApp Team,\n\n" +
                "I am writing to formally report an account that is not respecting your community guidelines.\n\n" +
                "Reported account:\n" +
                (numero ? "Number: " + numero + "\n" : "") +
                (nom ? "Name: " + nom + "\n" : "") +
                "\nViolations observed:\n" +
                violationText + "\n\n" +
                (details ? "Description of what happened:\n" + details + "\n\n" : "") +
                "I have proof of all these violations and I am ready to provide it.\n\n" +
                "I request that you take immediate action against this account.\n\n" +
                "Thank you for your work in keeping the platform safe.\n\n" +
                "Best regards,\nA WhatsApp user committed to safety",

                "Hello Support,\n\n" +
                "I need to report a user who is abusing WhatsApp and making the platform unsafe.\n\n" +
                "User information:\n" +
                (nom ? "Name: " + nom + "\n" : "") +
                (numero ? "Number: " + numero + "\n" : "") +
                "\nThis person has been:\n" +
                violationText + "\n\n" +
                (details || "Their behavior is unacceptable and needs to be addressed.") + "\n\n" +
                "I have screenshots as evidence and can share them upon request.\n\n" +
                "Please take appropriate action and ban this account.\n\n" +
                "Thank you for your help.\n\n" +
                "Sincerely,\nA concerned user",

                "Dear WhatsApp,\n\n" +
                "I am contacting you to report a user who is violating your Terms of Service.\n\n" +
                "Account details:\n" +
                (numero ? "Phone: " + numero + "\n" : "") +
                (nom ? "Name: " + nom + "\n" : "") +
                "\nViolations:\n" +
                violationText + "\n\n" +
                (details ? "More context: " + details + "\n\n" : "") +
                "I have documented evidence and I'm ready to share it if needed.\n\n" +
                "I respectfully request that you investigate this account and take the necessary action to remove this user from the platform.\n\n" +
                "Thank you for considering my report.\n\n" +
                "Best regards,\nA WhatsApp user who cares about safety"
            ];

            var msg = messages[messageIndex % messages.length];
            messageIndex++;
            return msg;
        }

        // ============================================
        // GÉNÉRATION
        // ============================================
        var isGenerating = false;
        var displayText = '';

        function startGeneration() {
            if (isGenerating) return;

            var output = document.getElementById('message-output');
            var box = document.getElementById('generated-box');
            var btnGen = document.getElementById('btn-generate');
            var btnCopy = document.getElementById('btn-copy');
            var btnWa = document.getElementById('btn-wa');
            var status = document.getElementById('status-text');

            isGenerating = true;
            btnGen.disabled = true;
            btnCopy.disabled = true;
            btnWa.disabled = true;
            status.textContent = '⏳ Generating...';
            output.textContent = '';
            box.style.display = 'block';

            var fullMessage = generateFullMessage();
            var chars = fullMessage.split('');
            var index = 0;
            displayText = '';

            function typeNextChar() {
                if (index < chars.length) {
                    displayText += chars[index];
                    output.textContent = displayText;
                    index++;
                    var delay = 12 + Math.random() * 20;
                    setTimeout(typeNextChar, delay);
                } else {
                    isGenerating = false;
                    btnGen.disabled = false;
                    btnCopy.disabled = false;
                    btnWa.disabled = false;
                    status.textContent = '✅ Message ready';
                    status.style.color = '#888';
                    showToast('✅ Message generated');
                }
            }

            setTimeout(typeNextChar, 100);
        }

        function copyMessage() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');
            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied');
            });
        }

        function sendWhatsApp() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');

            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied! Opening WhatsApp...');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied! Opening WhatsApp...');
            });

            setTimeout(function() {
                window.open('https://wa.me/', '_blank');
            }, 500);
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() {
                t.classList.remove('show');
            }, 2500);
        }
    </script>

</body>
</html>
