<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INUZUKA · Signal Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* === VIDÉO EN FOND === */
        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.35;
            pointer-events: none;
            filter: brightness(0.5) saturate(1.1);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* === ACCESS OVERLAY === */
        #access-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        #access-overlay.hidden { display: none; }

        #access-overlay .logo {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: 14px;
            color: #fff;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.7);
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        #access-overlay .logo span { color: #ff0000; }

        #access-overlay .sub {
            color: #ff2222;
            font-size: 14px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255,0,0,0.3);
        }

        #access-overlay .lock-icon {
            font-size: 45px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        #access-overlay input {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 0, 0, 0.4);
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 22px;
            color: #fff;
            text-align: center;
            width: 240px;
            outline: none;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            transition: 0.3s;
        }
        #access-overlay input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.15);
        }
        #access-overlay .btn-access {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 14px 56px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.25);
            transition: 0.3s;
        }
        #access-overlay .btn-access:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.4);
        }
        #access-overlay .error-msg {
            color: #ff4444;
            font-size: 14px;
            min-height: 20px;
            font-family: 'Courier New', monospace;
        }

        /* === MAIN CONTENT === */
        #main-content {
            display: none;
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 38px;
            max-width: 720px;
            width: 100%;
            margin: 20px auto;
        }

        .header-image {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        /* === LOGO WHATSAPP À CÔTÉ DU NOM === */
        .logo-wa-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 2px;
        }

        .wa-icon {
            width: 40px;
            height: 40px;
            fill: #25D366;
            filter: drop-shadow(0 0 20px rgba(37, 211, 102, 0.2));
            animation: waPulse 2.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes waPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(37, 211, 102, 0.2)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 35px rgba(37, 211, 102, 0.4)); }
        }

        .main-logo {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 14px;
            color: #ffffff;
            text-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
            text-align: center;
            font-family: 'Courier New', monospace;
            margin-bottom: 0;
        }
        .main-logo span { color: #ff1a1a; }

        .main-sub {
            text-align: center;
            color: #ff3333;
            font-size: 12px;
            letter-spacing: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 0, 0, 0.06);
            padding-bottom: 16px;
            margin-bottom: 22px;
            font-family: 'Courier New', monospace;
        }

        /* === BOUTON SON === */
        .sound-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            color: #aaa;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            font-family: 'Courier New', monospace;
        }
        .sound-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }
        .sound-btn.active {
            color: #25D366;
            border-color: rgba(37, 211, 102, 0.3);
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.1);
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 16px;
            color: #eee;
            font-size: 15px;
            font-family: 'Segoe UI', sans-serif;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-bottom: 1px solid #ff3333;
        }
        .form-group select option {
            background: #111;
            color: #eee;
        }
        .form-group textarea {
            min-height: 60px;
            resize: vertical;
            font-family: 'Segoe UI', sans-serif;
        }

        .generated-box {
            background: rgba(255, 0, 0, 0.03);
            border-radius: 16px;
            padding: 18px 20px;
            margin: 18px 0 20px;
            text-align: left;
            display: none;
            max-height: 450px;
            overflow-y: auto;
            min-height: 50px;
            border-left: 2px solid rgba(255, 0, 0, 0.12);
        }
        .generated-box.visible { display: block; }
        .generated-box .msg-title {
            color: #ff4444;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
        }
        .generated-box .msg-content {
            color: #eee;
            font-size: 14px;
            line-height: 1.9;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Segoe UI', sans-serif;
        }
        .generated-box .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 17px;
            background: #ff3333;
            animation: blink 0.7s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 14px 34px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 130px;
            font-family: 'Courier New', monospace;
        }
        .btn-generate {
            background: #ff1a1a;
            color: #fff;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }
        .btn-generate:hover {
            background: #cc0000;
            transform: scale(1.03);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.35);
        }
        .btn-generate:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-copy {
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .btn-copy:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-whatsapp {
            background: #25D366;
            color: #fff;
        }
        .btn-whatsapp:hover {
            background: #1da851;
            transform: scale(1.03);
        }
        .btn-whatsapp:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 0, 0, 0.15);
            padding: 12px 28px;
            border-radius: 40px;
            color: #ccc;
            font-size: 13px;
            z-index: 1002;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
        .toast.show { opacity: 1; }

        .status-text {
            color: #777;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            min-height: 18px;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 0, 0, 0.05);
            font-family: 'Courier New', monospace;
        }
        .footer-link a {
            color: #ff5555;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 3px;
            transition: 0.3s;
            opacity: 0.6;
        }
        .footer-link a:hover {
            opacity: 1;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .whatsapp-note {
            text-align: center;
            color: #444;
            font-size: 10px;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            #main-content { padding: 24px 16px; margin: 10px; }
            .main-logo { font-size: 30px; letter-spacing: 8px; }
            .logo-wa-container { gap: 10px; }
            .wa-icon { width: 32px; height: 32px; }
            .header-image { max-height: 180px; }
            .sound-btn { bottom: 80px; right: 16px; width: 42px; height: 42px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- === VIDÉO EN FOND === -->
    <video autoplay loop playsinline id="bg-video">
        <source src="IMG_6901.MOV" type="video/mp4">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la vidéo.
    </video>
    <div class="bg-overlay"></div>

    <!-- === MUSIQUE (audio) === -->
    <audio id="bg-audio" loop>
        <source src="song.mp3.m4a" type="audio/mp4">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <!-- === BOUTON SON === -->
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔇</button>

    <!-- === ACCESS OVERLAY === -->
    <div id="access-overlay">
        <div class="lock-icon">⛔</div>
        <div class="logo">INUZUKA</div>
        <div class="sub">Access Restricted</div>
        <input type="password" id="access-input" placeholder="••••" maxlength="4" autofocus>
        <button class="btn-access" onclick="checkAccess()">ENTER</button>
        <div class="error-msg" id="access-error"></div>
    </div>

    <!-- === MAIN CONTENT === -->
    <div id="main-content">
        <img class="header-image" id="header-image" src="53517900-6B79-4E2E-92C0-16CD724C4CAE.jpeg" alt="INUZUKA" onerror="this.style.display='none'">

        <!-- === LOGO WHATSAPP + INUZUKA === -->
        <div class="logo-wa-container">
            <svg class="wa-icon" viewBox="0 0 24 24">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <div class="main-logo">I<span>N</span>UZUKA</div>
        </div>
        <div class="main-sub">⚡ Signal Generator ⚡</div>

        <div class="form-group">
            <label>👤 Name / Username of the abuser</label>
            <input type="text" id="nom" placeholder="Ex: John DOE or @username">
        </div>

        <div class="form-group">
            <label>📱 Their WhatsApp number</label>
            <input type="text" id="numero" placeholder="+221 70 820 15 85">
        </div>

        <div class="form-group">
            <label>⚠️ Type of violation</label>
            <select id="type">
                <option value="harassment">Harassment / Bullying</option>
                <option value="scam">Scam / Fraud</option>
                <option value="identity">Identity Theft</option>
                <option value="illegal">Illegal Content</option>
                <option value="threats">Threats / Violence</option>
                <option value="impersonation">Impersonation</option>
                <option value="doxxing">Doxxing / Private info leaked</option>
                <option value="other">Other (serious)</option>
            </select>
        </div>

        <div class="form-group">
            <label>📝 What happened ? (be honest)</label>
            <textarea id="details" placeholder="Describe exactly what this person did to you..."></textarea>
        </div>

        <div class="generated-box" id="generated-box">
            <div class="msg-title">📨 GENERATING MESSAGE...</div>
            <div class="msg-content" id="message-output">
                <span class="cursor-blink"></span>
            </div>
        </div>

        <div class="status-text" id="status-text">Fill the form and click GENERATE</div>

        <div class="btn-group">
            <button class="btn btn-generate" id="btn-generate" onclick="startGeneration()">⚡ GENERATE</button>
            <button class="btn btn-copy" id="btn-copy" disabled onclick="copyMessage()">📋 COPY</button>
            <button class="btn btn-whatsapp" id="btn-wa" disabled onclick="sendWhatsApp()">💬 WHATSAPP</button>
        </div>

        <div class="whatsapp-note">📌 Message copied automatically — then paste in WhatsApp Support chat</div>

        <div class="footer-link">
            <a href="https://ablaye2020.github.io" target="_blank">ablaye2020.github.io</a>
        </div>
    </div>

    <script>
        // ============================================
        // GESTION DU SON (VIDÉO + MUSIQUE)
        // ============================================
        var video = document.getElementById('bg-video');
        var audio = document.getElementById('bg-audio');
        var soundBtn = document.getElementById('soundBtn');
        var isSoundOn = false;

        function toggleSound() {
            if (isSoundOn) {
                video.muted = true;
                audio.pause();
                soundBtn.textContent = '🔇';
                soundBtn.classList.remove('active');
                isSoundOn = false;
            } else {
                video.muted = false;
                video.volume = 0.3;
                audio.volume = 0.4;
                audio.play().catch(function(e) {
                    console.log('Audio play failed:', e);
                });
                soundBtn.textContent = '🔊';
                soundBtn.classList.add('active');
                isSoundOn = true;
            }
        }

        // ============================================
        // CODE D'ACCÈS : 2006
        // ============================================
        function checkAccess() {
            var input = document.getElementById('access-input');
            var error = document.getElementById('access-error');
            var code = input.value;
            
            if (code === '2006') {
                document.getElementById('access-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                error.textContent = '';
            } else {
                error.textContent = '❌ Incorrect code';
                input.value = '';
                input.focus();
            }
        }

        document.getElementById('access-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                checkAccess();
            }
        });

        // ============================================
        // MESSAGES
        // ============================================
        var messageIndex = 0;

        function generateFullMessage() {
            var nom = document.getElementById('nom').value.trim();
            var numero = document.getElementById('numero').value.trim();
            var details = document.getElementById('details').value.trim();
            var type = document.getElementById('type').value;

            var typeLabels = {
                harassment: "harassment and bullying",
                scam: "scam and fraud",
                identity: "identity theft",
                illegal: "illegal content",
                threats: "threats and violence",
                impersonation: "impersonation",
                doxxing: "doxxing and sharing private information",
                other: "serious violations"
            };

            var typeLabel = typeLabels[type] || "serious violations";

            var violationTexts = {
                harassment: "Harassment and intimidation\nAbusive behavior\nMaking me feel unsafe",
                scam: "Scam attempts\nFraudulent behavior\nMisleading others for money",
                identity: "Identity theft\nPretending to be me or others\nUsing fake identity to harm",
                illegal: "Sharing illegal content\nInappropriate material\nViolating community standards",
                threats: "Threats and intimidation\nViolent language\nMaking me fear for my safety",
                impersonation: "Impersonation\nPretending to be someone they're not\nDeceiving others",
                doxxing: "Sharing private information\nDoxxing\nViolating my privacy",
                other: "Multiple Terms of Service violations\nAbusive behavior\nCreating an unsafe environment"
            };

            var violationText = violationTexts[type] || violationTexts.other;

            var messages = [
                "Hello,\n\nI am writing to report a WhatsApp account that is not respecting the platform's rules.\n\n" +
                "Account concerned: " + (numero || "[number not provided]") + (nom ? " (" + nom + ")" : "") + "\n\n" +
                "This account has a dangerous behavior and abuses other users. I have observed several violations:\n" +
                violationText + "\n\n" +
                (details ? "Additional details: " + details + "\n\n" : "") +
                "I have evidence (screenshots) that I can provide if needed.\n\n" +
                "I kindly ask you to permanently block this account to protect the WhatsApp community.\n\n" +
                "Thank you for considering my request.\n\n" +
                "Sincerely,\nA concerned user",

                "Dear WhatsApp Support,\n\n" +
                "I want to report a user who is clearly violating your Terms of Service.\n\n" +
                "User: " + (nom || "Unknown") + "\n" +
                "Phone number: " + (numero || "Not provided") + "\n\n" +
                "This person has been engaging in " + typeLabel + ". I've noticed:\n" +
                violationText + "\n\n" +
                (details ? "Here's what happened: " + details + "\n\n" : "") +
                "I have screenshots and proof of everything I'm saying.\n\n" +
                "I'm asking you to investigate this account and take the necessary action to remove this person from WhatsApp.\n\n" +
                "Thank you for your help.\n\n" +
                "Best regards,\nA WhatsApp user",

                "Hello,\n\n" +
                "I'm reaching out to report a serious issue with a WhatsApp account.\n\n" +
                "Account to report: " + (numero || "Unknown number") + (nom ? " (" + nom + ")" : "") + "\n\n" +
                "This account is engaging in abusive behavior and breaking your rules:\n" +
                violationText + "\n\n" +
                (details || "This person has been causing problems for me and others on the platform.") + "\n\n" +
                "I have documented evidence ready to share if you need it.\n\n" +
                "Please block this account permanently. We need to keep WhatsApp safe for everyone.\n\n" +
                "Thanks for your attention to this matter.\n\n" +
                "Sincerely,\nA concerned user",

                "Dear WhatsApp Team,\n\n" +
                "I am writing to formally report an account that is not respecting your community guidelines.\n\n" +
                "Reported account:\n" +
                (numero ? "Number: " + numero + "\n" : "") +
                (nom ? "Name: " + nom + "\n" : "") +
                "\nViolations observed:\n" +
                violationText + "\n\n" +
                (details ? "Description of what happened:\n" + details + "\n\n" : "") +
                "I have proof of all these violations and I am ready to provide it.\n\n" +
                "I request that you take immediate action against this account.\n\n" +
                "Thank you for your work in keeping the platform safe.\n\n" +
                "Best regards,\nA WhatsApp user committed to safety",

                "Hello Support,\n\n" +
                "I need to report a user who is abusing WhatsApp and making the platform unsafe.\n\n" +
                "User information:\n" +
                (nom ? "Name: " + nom + "\n" : "") +
                (numero ? "Number: " + numero + "\n" : "") +
                "\nThis person has been:\n" +
                violationText + "\n\n" +
                (details || "Their behavior is unacceptable and needs to be addressed.") + "\n\n" +
                "I have screenshots as evidence and can share them upon request.\n\n" +
                "Please take appropriate action and ban this account.\n\n" +
                "Thank you for your help.\n\n" +
                "Sincerely,\nA concerned user",

                "Dear WhatsApp,\n\n" +
                "I am contacting you to report a user who is violating your Terms of Service.\n\n" +
                "Account details:\n" +
                (numero ? "Phone: " + numero + "\n" : "") +
                (nom ? "Name: " + nom + "\n" : "") +
                "\nViolations:\n" +
                violationText + "\n\n" +
                (details ? "More context: " + details + "\n\n" : "") +
                "I have documented evidence and I'm ready to share it if needed.\n\n" +
                "I respectfully request that you investigate this account and take the necessary action to remove this user from the platform.\n\n" +
                "Thank you for considering my report.\n\n" +
                "Best regards,\nA WhatsApp user who cares about safety"
            ];

            var msg = messages[messageIndex % messages.length];
            messageIndex++;
            return msg;
        }

        // ============================================
        // GÉNÉRATION
        // ============================================
        var isGenerating = false;
        var displayText = '';

        function startGeneration() {
            if (isGenerating) return;

            var output = document.getElementById('message-output');
            var box = document.getElementById('generated-box');
            var btnGen = document.getElementById('btn-generate');
            var btnCopy = document.getElementById('btn-copy');
            var btnWa = document.getElementById('btn-wa');
            var status = document.getElementById('status-text');

            isGenerating = true;
            btnGen.disabled = true;
            btnCopy.disabled = true;
            btnWa.disabled = true;
            status.textContent = '⏳ Generating...';
            output.textContent = '';
            box.style.display = 'block';

            var fullMessage = generateFullMessage();
            var chars = fullMessage.split('');
            var index = 0;
            displayText = '';

            function typeNextChar() {
                if (index < chars.length) {
                    displayText += chars[index];
                    output.textContent = displayText;
                    index++;
                    var delay = 12 + Math.random() * 20;
                    setTimeout(typeNextChar, delay);
                } else {
                    isGenerating = false;
                    btnGen.disabled = false;
                    btnCopy.disabled = false;
                    btnWa.disabled = false;
                    status.textContent = '✅ Message ready';
                    status.style.color = '#777';
                    showToast('✅ Message generated');
                }
            }

            setTimeout(typeNextChar, 100);
        }

        function copyMessage() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');
            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied');
            });
        }

        function sendWhatsApp() {
            var text = document.getElementById('message-output').textContent;
            if (!text) return showToast('❌ Generate a message first');

            navigator.clipboard.writeText(text).then(function() {
                showToast('📋 Copied! Opening WhatsApp...');
            }).catch(function() {
                var area = document.createElement('textarea');
                area.value = text;
                document.body.appendChild(area);
                area.select();
                document.execCommand('copy');
                area.remove();
                showToast('📋 Copied! Opening WhatsApp...');
            });

            setTimeout(function() {
                window.open('https://wa.me/', '_blank');
            }, 500);
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() {
                t.classList.remove('show');
            }, 2500);
        }
    </script>

</body>
</html>
